services:
  # Database Services
  mysql:
    image: mysql:8.0
    container_name: vuproject-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vuproject_ca}
      MYSQL_USER: ${MYSQL_USER:-vuproject}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-vuproject123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"
    networks:
      - vuproject-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vuproject-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vuproject-network
    restart: unless-stopped

  # Step-CA Server
  step-ca:
    build:
      context: ./step-ca-docker
      dockerfile: Dockerfile
    container_name: vuproject-step-ca
    environment:
      - STEP_CA_PASSWORD=${STEP_CA_PASSWORD:-password123}
      - STEP_CA_NAME=${STEP_CA_NAME:-VuProject CA}
      - STEP_CA_DNS=${STEP_CA_DNS:-localhost}
    volumes:
      - step_ca_data:/home/step
      - ./docker/step-ca/config:/etc/step-ca
    ports:
      - "8443:8443"
    networks:
      - vuproject-network
    restart: unless-stopped
    depends_on:
      - mysql

  # Laravel API Backend
  laravel-api:
    build:
      context: ./vu-laravel
      dockerfile: Dockerfile
    container_name: vuproject-laravel-api
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE:-vuproject_ca}
      - DB_USERNAME=${MYSQL_USER:-vuproject}
      - DB_PASSWORD=${MYSQL_PASSWORD:-vuproject123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STEP_CA_URL=https://step-ca:8443
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-key}
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
    volumes:
      - ./vu-laravel:/var/www/html
      - laravel_storage:/var/www/html/storage
      - laravel_logs:/var/www/html/storage/logs
    ports:
      - "8000:8000"
    networks:
      - vuproject-network
    depends_on:
      - mysql
      - redis
      - step-ca
    restart: unless-stopped

  # React Frontend
  react-frontend:
    build:
      context: ./vu-react
      dockerfile: Dockerfile
    container_name: vuproject-react-frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
      - REACT_APP_STEP_CA_URL=https://localhost:8443
    ports:
      - "3000:3000"
    networks:
      - vuproject-network
    depends_on:
      - laravel-api
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vuproject-nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    networks:
      - vuproject-network
    depends_on:
      - react-frontend
      - laravel-api
      - step-ca
    restart: unless-stopped

  # Monitoring & Logging
  prometheus:
    image: prom/prometheus:latest
    container_name: vuproject-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - vuproject-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: vuproject-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    networks:
      - vuproject-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # Elasticsearch for Logging
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: vuproject-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - vuproject-network
    restart: unless-stopped

  # Kibana for Log Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: vuproject-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - vuproject-network
    depends_on:
      - elasticsearch
    restart: unless-stopped

  # Vault for Key Management
  vault:
    image: vault:latest
    container_name: vuproject-vault
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_ROOT_TOKEN:-root}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
    networks:
      - vuproject-network
    restart: unless-stopped

  # Logstash for Log Processing
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: vuproject-logstash
    volumes:
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline
      - ./docker/logstash/config:/usr/share/logstash/config
    ports:
      - "5044:5044"
    networks:
      - vuproject-network
    depends_on:
      - elasticsearch
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  step_ca_data:
  laravel_storage:
  laravel_logs:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
  vault_data:

networks:
  vuproject-network:
    driver: bridge
